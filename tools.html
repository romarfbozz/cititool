<!doctype html><html lang="de"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>CitiTool — Werkzeugschrank</title><link rel="stylesheet" href="style.css"></head><body>
<header class="header"><div class="wrap row">
  <div class="brand"><div class="logo">CT</div><div><div class="title">CitiTool Assistent</div><div class="sub">Werkzeugschrank</div></div></div>
</div></header>
<main class="wrap" style="padding:1rem">
  <section class="card">
    <div class="card-h" style="gap:.7rem">
      <button id="btnCats" class="btn">Kategorien</button>
      <div id="curCat" class="small" style="margin-left:.3rem;color:#475569">• Kategorie: <b>Alle</b></div>
      <span style="flex:1"></span>
      <button id="btnNew" class="btn">Neue Werkzeug</button>
    </div>
    <div class="card-b"><div id="list" class="card"></div></div>
  </section>
</main>

<!-- Drawer Kategorien -->
<div id="cats" class="drawer" role="dialog" aria-modal="true">
  <div class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <b>Kategorien</b>
      <button id="catsClose" class="btn sm">Schließen</button>
    </div>
    <div id="catList"></div>
    <div style="margin-top:10px;display:flex;gap:.4rem">
      <input id="newCatName" class="btn" placeholder="Neue Kategorie" style="flex:1">
      <button id="addCat" class="btn sm">Hinzufügen</button>
    </div>
  </div>
</div>

<!-- Editor Modal -->
<div id="dlg" class="modal" aria-modal="true" role="dialog">
  <div class="box">
    <div class="card-h" style="justify-content:space-between"><b>Werkzeug bearbeiten</b>
      <button class="btn sm" id="btnClose">Schließen</button></div>
    <form id="fm">
      <div class="card-b grid">
        <label>Name<input name="name" class="btn" required></label>
        <label>Code<input name="code" class="btn"></label>
        <label>Kategorie<select name="cat" class="btn" style="height:38px"></select></label>
        <label>ISO
          <select name="iso" class="btn" style="height:38px">
            <option value="">—</option><option>P</option><option>M</option><option>K</option><option>N</option><option>S</option><option>H</option>
          </select>
        </label>
        <label>Hersteller<input name="maker" class="btn"></label>
        <label>Ressource %<input type="number" min="0" max="100" step="1" name="res" class="btn" value="100"></label>
        <label style="grid-column:1/-1">Notiz<textarea name="note" class="btn" rows="6"></textarea></label>
        <label>Foto<input type="file" accept="image/*" id="photoIn" class="btn"></label>
        <img id="photoPrev" class="thumb-list" alt="Foto" />
      </div>
      <div class="box foot">
        <span style="flex:1"></span>
        <button type="button" class="btn" id="btnCancel">Abbrechen</button>
        <button type="submit" class="btn">Speichern</button>
      </div>
    </form>
  </div>
</div>

<!-- Info Modal (i) -->
<div id="pv" class="modal" aria-modal="true" role="dialog">
  <div class="box">
    <div class="card-h" style="justify-content:space-between"><b>Werkzeug</b><button class="btn sm" id="pvClose">Schließen</button></div>
    <div class="card-b"><div id="pvBody" style="white-space:pre-wrap;color:#334155"></div></div>
    <div class="box foot">
      <button id="pvEdit" class="btn">Bearbeiten</button>
      <button id="pvDel" class="btn-danger">Löschen</button>
      <span style="flex:1"></span>
      <button id="toSetup" class="btn">+ Zu Setup hinzufügen</button>
    </div>
  </div>
</div>

<!-- Add To Setup Modal -->
<div id="setupDlg" class="modal" aria-modal="true" role="dialog">
  <div class="box">
    <div class="card-h" style="justify-content:space-between"><b>Zu Setup hinzufügen</b><button class="btn sm" id="setupClose">Schließen</button></div>
    <form id="setupFm">
      <div class="card-b grid">
        <label>Ebene
          <select name="plane" class="btn" style="height:38px">
            <option value="RO">RO (G54)</option>
            <option value="RU">RU (G55)</option>
          </select>
        </label>
        <label>Position
          <select name="pos" class="btn" style="height:38px"></select>
        </label>
        <label style="grid-column:1/-1">Operation<input name="op" class="btn" placeholder="z. B. Schruppen"></label>
        <label style="grid-column:1/-1">Notiz<textarea name="note" class="btn" rows="4"></textarea></label>
      </div>
      <div class="box foot">
        <span id="warnRes" class="small"></span>
        <span style="flex:1"></span>
        <button type="button" class="btn" id="setupCancel">Abbrechen</button>
        <button type="submit" class="btn">Hinzufügen</button>
      </div>
    </form>
  </div>
</div>

<nav class="dock">
  <a class="tab" href="index.html" ><span>📊</span></a>
  <a class="tab" href="tools.html" aria-current="page"><span>📦</span></a>
  <a class="tab" href="docs.html" ><span>📘</span></a>
</nav>

<script>
const NS='ct_tools_v2', LS={TOOLS:NS+'_tools', CATS:NS+'_cats', SETUP:'ct_setup_live'};
const $=s=>document.querySelector(s);
const read=(k,f)=>{ try{const v=localStorage.getItem(k); return v?JSON.parse(v):f }catch(e){ return f } };
const write=(k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v))}catch(e){} };
function uid(){ try{return crypto.randomUUID()}catch(e){return Math.random().toString(36).slice(2)} }
function isoBadge(v){ if(!v) return ''; const c=v; return '<span class="iso '+c+'">'+c+'</span>'; }
function imgTag(b64){ return b64 ? '<img class="thumb-list" src="'+b64+'" alt="foto"/>' : '<div class="thumb-list"></div>'; }

function seed(){
  if(!localStorage.getItem(LS.CATS)) write(LS.CATS, ['Halter','Platten','Zubehör']);
  if(!localStorage.getItem(LS.TOOLS)) write(LS.TOOLS,[
    {id:uid(), name:'VDI30-Halter', code:'VDI30-R', cat:'Halter', iso:'', maker:'EWS', res:80, note:'Rechts, Schnellwechsel', photo:''},
    {id:uid(), name:'CNMG120408', code:'CNMG-120408-PM', cat:'Platten', iso:'P', maker:'Sandvik', res:20, note:'Stahl P — PM', photo:''},
    {id:uid(), name:'Bohrer Ø10', code:'DIN338 HSS', cat:'Zubehör', iso:'', maker:'Guhring', res:100, note:'HSS, 118°', photo:''},
  ]);
  if(!localStorage.getItem(LS.SETUP)) write(LS.SETUP,{RO:Array(12).fill(null), RU:Array(12).fill(null)});
}

let CAT=null; let CURRENT=null;

function draw(){
  const tools=read(LS.TOOLS,[]).filter(t=>!CAT || t.cat===CAT);
  const host=$('#list');
  host.innerHTML = tools.map(t=>`
    <div class="item card-b">
      <div class="tool-row">
        <div style="display:flex;align-items:center;gap:.6rem;min-width:0">
          ${imgTag(t.photo)}
          <div style="min-width:0">
            <div style="font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.name} / ${t.code}</div>
            <div class="small">${t.cat||'—'} • ${t.maker||'—'} • ${isoBadge(t.iso)} • Ressource ${t.res||0}%</div>
          </div>
        </div>
        <div style="display:flex;gap:.4rem;align-items:center">
          <button class="btn sm" data-info="${t.id}">i</button>
        </div>
      </div>
    </div>
  `).join('') || '<div class="card-b small">Keine Werkzeuge</div>';

  host.querySelectorAll('[data-info]').forEach(b=>b.onclick=()=>openInfo(b.dataset.info));
  $('#curCat').innerHTML='• Kategorie: <b>'+ (CAT||'Alle') +'</b>';
}

function drawCats(){
  const cats=read(LS.CATS,[]), tools=read(LS.TOOLS,[]);
  const host=$('#catList');
  host.innerHTML = ['Alle', ...cats].map(c=>{
    const count = c==='Alle' ? tools.length : tools.filter(d=>d.cat===c).length;
    const delBtn = (c==='Alle' || count>0) ? '' : `<button class="btn sm" data-del="${c}">Löschen</button>`;
    return `<div class="cat ${CAT===c?'active':''}" data-cat="${c}"><span>${c} <span class="small">(${count})</span></span>${delBtn}</div>`
  }).join('');
  host.querySelectorAll('.cat').forEach(el=>el.onclick=(e)=>{
    const c = el.dataset.cat;
    if(e.target && e.target.dataset && e.target.dataset.del){ return; }
    CAT = (c==='Alle') ? null : c;
    draw(); closeCats();
  });
  host.querySelectorAll('[data-del]').forEach(b=>b.onclick=(e)=>{e.stopPropagation(); let cats=read(LS.CATS,[]); cats = cats.filter(x=>x!==b.dataset.del); write(LS.CATS,cats); drawCats(); });
}

function openCats(){ $('#cats').setAttribute('open',''); }
function closeCats(){ $('#cats').removeAttribute('open'); }

function openEditor(id){
  const arr=read(LS.TOOLS,[]); const cur=id?arr.find(x=>x.id===id):{id:null,name:'',code:'',cat:(CAT||read(LS.CATS,[])[0]||''),iso:'',maker:'',res:100,note:'',photo:''};
  const dlg=$('#dlg'); dlg.setAttribute('open','');
  const fm=$('#fm'); const cats=read(LS.CATS,[]); fm.cat.innerHTML=cats.map(c=>`<option ${c===cur.cat?'selected':''}>${c}</option>`).join('');
  fm.name.value=cur.name||''; fm.code.value=cur.code||''; fm.iso.value=cur.iso||''; fm.maker.value=cur.maker||''; fm.res.value=cur.res||0; fm.note.value=cur.note||'';
  const photoPrev=$('#photoPrev'); photoPrev.src=cur.photo||'';
  $('#photoIn').onchange=(e)=>{ const f=e.target.files[0]; if(!f) return; const fr=new FileReader(); fr.onload=()=>{ photoPrev.src=fr.result; }; fr.readAsDataURL(f); };
  $('#btnCancel').onclick=()=>dlg.removeAttribute('open'); $('#btnClose').onclick=()=>dlg.removeAttribute('open');
  fm.onsubmit=(ev)=>{ev.preventDefault();
    const obj={id:cur.id||uid(), name:fm.name.value.trim(), code:fm.code.value.trim(), cat:fm.cat.value.trim(), iso:fm.iso.value, maker:fm.maker.value.trim(), res:parseInt(fm.res.value||'0'), note:fm.note.value, photo:photoPrev.src||''};
    let arr=read(LS.TOOLS,[]); const i=arr.findIndex(x=>x.id===obj.id); if(i>-1) arr[i]=obj; else arr.unshift(obj);
    write(LS.TOOLS,arr); dlg.removeAttribute('open'); draw();
  };
}

function openInfo(id){
  const t=read(LS.TOOLS,[]).find(x=>x.id===id); if(!t) return; CURRENT=t;
  const warn = (t.res||0)<=0 ? '<div class="warn">Achtung: Ressource = 0%</div>' : '';
  $('#pvBody').innerHTML = [
    '<div style="display:flex;gap:.8rem;align-items:center;margin-bottom:.4rem">',
      '<img class="pv-img" src="'+(t.photo||'')+'" alt="Foto">',
      '<div><div style="font-weight:900">'+(t.name||'')+'</div><div class="small">'+(t.code||'')+'</div></div>',
    '</div>',
    '<div class="small">Kategorie: <b>'+(t.cat||'—')+'</b></div>',
    '<div class="small">ISO: '+(t.iso?('<span class="iso '+t.iso+'">'+t.iso+'</span>'):'—')+'</div>',
    '<div class="small">Hersteller: '+(t.maker||'—')+'</div>',
    '<div class="small">Ressource: '+((t.res||0))+'%</div>',
    '<div class="small" style="margin-top:.4rem;white-space:pre-wrap">'+(t.note||'')+'</div>',
    warn
  ].join('');
  $('#pv').setAttribute('open','');

  // Footer actions are bound here
  document.getElementById('pvEdit').onclick=()=>{ document.getElementById('pv').removeAttribute('open'); openEditor(id); };
  document.getElementById('pvDel').onclick=()=>{
    let arr=read(LS.TOOLS,[]); const i=arr.findIndex(x=>x.id===id); if(i>-1){ arr.splice(i,1); write(LS.TOOLS,arr); }
    document.getElementById('pv').removeAttribute('open'); draw();
  };
}

function fillSetupPositions(plane){
  const setup=read(LS.SETUP,{RO:Array(12).fill(null), RU:Array(12).fill(null)});
  const slots = setup[plane];
  const sel = document.querySelector('#setupFm select[name="pos"]');
  sel.innerHTML='';
  for(let i=1;i<=12;i++){
    const used = !!slots[i-1];
    const opt = document.createElement('option');
    opt.value = String(i);
    opt.textContent = used ? i+' (belegt)' : String(i);
    if(used) opt.disabled = true;
    sel.appendChild(opt);
  }
  const free = slots.findIndex(x=>!x);
  sel.value = free>=0 ? String(free+1) : '1';
}

function openSetupDlg(){
  if(!CURRENT) return;
  document.getElementById('setupDlg').setAttribute('open','');
  const fm=document.getElementById('setupFm');
  const warn=document.getElementById('warnRes'); warn.textContent = (CURRENT.res||0)<=0 ? '⚠️ Bestand 0% — prüfen!' : '';
  fillSetupPositions(fm.plane.value);
  fm.plane.onchange=()=>fillSetupPositions(fm.plane.value);
  document.getElementById('setupCancel').onclick=()=>document.getElementById('setupDlg').removeAttribute('open');
  document.getElementById('setupClose').onclick=()=>document.getElementById('setupDlg').removeAttribute('open');
  fm.onsubmit=(e)=>{e.preventDefault();
    const plane=fm.plane.value; const pos=parseInt(fm.pos.value)-1;
    const setup=read(LS.SETUP,{RO:Array(12).fill(null), RU:Array(12).fill(null)});
    setup[plane][pos] = {toolId:CURRENT.id, name:CURRENT.name, code:CURRENT.code, iso:CURRENT.iso, maker:CURRENT.maker, op:fm.op.value, note:fm.note.value};
    write(LS.SETUP, setup);
    document.getElementById('setupDlg').removeAttribute('open'); alert('Hinzugefügt zu '+plane+' Pos '+(pos+1));
  };
}

document.addEventListener('DOMContentLoaded',()=>{
  seed(); draw(); drawCats();
  document.getElementById('btnCats').onclick=()=>document.getElementById('cats').setAttribute('open','');
  document.getElementById('catsClose').onclick=()=>document.getElementById('cats').removeAttribute('open');
  document.getElementById('addCat').onclick=()=>{ const name=document.getElementById('newCatName').value.trim(); if(!name) return; let cats=read(LS.CATS,[]); if(!cats.includes(name)){ cats.push(name); write(LS.CATS,cats); document.getElementById('newCatName').value=''; drawCats(); } };
  document.getElementById('btnNew').onclick=()=>openEditor(null);
  document.getElementById('pvClose').onclick=()=>document.getElementById('pv').removeAttribute('open');
  document.getElementById('toSetup').onclick=()=>{ document.getElementById('pv').removeAttribute('open'); openSetupDlg(); };
});
</script>

</body></html>
