<!doctype html><html lang="de"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>CitiTool — Werkzeugschrank</title><link rel="stylesheet" href="style.css"></head><body>
<header class="header"><div class="wrap row">
  <div class="brand"><div class="logo">CT</div><div><div class="title">CitiTool Assistent</div><div class="sub">Werkzeugschrank</div></div></div>
</div></header>
<main class="wrap" style="padding:1rem">
  <section class="card">
    <div class="card-h">
      <b>Werkzeuge</b>
      <div class="row">
        <button class="btn" id="btnDrawer">Kategorien</button>
        <button class="btn" id="btnNew">Neues Werkzeug</button>
        <button class="btn" id="btnDemo">Demo laden</button>
      </div>
    </div>
    <div class="card-b">
      <div class="row" style="margin-bottom:8px">
        <input id="q" class="input" placeholder="Suche…">
        <select id="fCat" style="min-width:160px"></select>
        <select id="fISO" style="min-width:120px">
          <option value="">ISO</option><option>P</option><option>M</option><option>K</option><option>N</option><option>S</option><option>H</option>
        </select>
        <input id="fMaker" class="input" placeholder="Hersteller" style="min-width:150px">
      </div>
      <div id="list"></div>
    </div>
  </section>
</main>
<nav class="dock">
  <a class="tab" href="index.html" ><span>📊</span></a>
  <a class="tab" href="programme.html" ><span>💾</span></a>
  <a class="tab" href="setup.html" ><span>🛠️</span></a>
  <a class="tab" href="tools.html" aria-current="page"><span>📦</span></a>
  <a class="tab" href="docs.html" ><span>📚</span></a>
</nav>
<!-- Drawer -->
<div id="drawer" class="drawer">
  <div class="back"></div>
  <aside class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <b>Kategorien</b><button class="btn sm" id="catClose">Schließen</button>
    </div>
    <div id="catList" class="small" style="margin-top:8px"></div>
    <hr>
    <div class="row">
      <input id="catName" class="input" placeholder="Neue Kategorie">
      <button class="btn" id="catAdd">Hinzufügen</button>
    </div>
  </aside>
</div>

<!-- Edit Modal -->
<div id="ed" class="modal">
  <div class="box">
    <div class="card-h"><b id="edTitle">Werkzeug</b><button class="btn sm" id="edClose">Schließen</button></div>
    <div class="card-b">
      <div class="row">
        <input id="tName" class="input" placeholder="Name">
        <input id="tCode" class="input" placeholder="Code">
        <select id="tCat" style="min-width:160px"></select>
        <select id="tISO" style="min-width:120px"><option value="">ISO</option><option>P</option><option>M</option><option>K</option><option>N</option><option>S</option><option>H</option></select>
      </div>
      <div class="row" style="margin-top:8px">
        <input id="tMaker" class="input" placeholder="Hersteller">
        <input id="tQty" class="input" type="number" placeholder="qty">
        <input id="tMin" class="input" type="number" placeholder="min">
      </div>
      <div class="row" style="margin-top:8px;align-items:center">
        <input id="tPhoto" class="input" type="file" accept="image/*" style="padding:.4rem">
        <img id="tPreview" class="thumb" alt="">
      </div>
      <div class="row" style="margin-top:8px">
        <textarea id="tNote" rows="3" class="input" placeholder="Notizen…"></textarea>
      </div>
    </div>
    <div class="foot">
      <button class="btn warn" id="tDelete">Löschen</button>
      <button class="btn" id="tSave">Speichern</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LS_TOOLS='ct_tools_v2_tools', LS_CATS='ct_tools_v2_cats';
const $=s=>document.querySelector(s);
const read=(k,f)=>{ try{const v=localStorage.getItem(k); return v?JSON.parse(v):f }catch(e){ return f } };
const write=(k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v))}catch(e){} };
const uid=()=>Math.random().toString(36).slice(2,9);
const toast=t=>{const el=$('#toast'); el.textContent=t; el.setAttribute('show',''); setTimeout(()=>el.removeAttribute('show'),1200);};

function cats(){ return read(LS_CATS, ['Halter','Platten','Zubehör']); }
function saveCats(arr){ write(LS_CATS, arr); fillCatFilters(); drawCats(); }

function fillCatFilters(){ const c=cats(); $('#fCat').innerHTML=['<option value="">Kategorie</option>'].concat(c.map(x=>`<option>${x}</option>`)).join(''); $('#tCat').innerHTML=c.map(x=>`<option>${x}</option>`).join(''); }
function drawCats(){ const c=cats(); $('#catList').innerHTML=c.map((x,i)=>`<div class='item'><div class='item-head'><div>${x}</div><div class='row'><button class='btn sm' data-ren='${i}'>✏️</button><button class='btn sm' data-del='${i}'>🗑️</button></div></div></div>`).join(''); $('#catList').querySelectorAll('[data-ren]').forEach(b=>b.onclick=()=>{ const i=parseInt(b.dataset.ren); const c=cats(); const nn=prompt('Neuer Name:', c[i]); if(!nn) return; c[i]=nn; saveCats(c); }); $('#catList').querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{ const i=parseInt(b.dataset.del); const c=cats(); const name=c[i]; const tools=read(LS_TOOLS,[]); if(tools.some(t=>t.cat===name)){ alert('Kategorie wird benutzt. Erst umhängen.'); return;} c.splice(i,1); saveCats(c); }); }

function listLine(t){ const low=(typeof t.qty==='number' && typeof t.min==='number' && t.qty<=t.min); return `<div class='item'><div class='item-head'><div style='display:flex;gap:.6rem;align-items:center;min-width:0'>${t.photo?`<img class='thumb' src='${t.photo}'>`:`<div class='thumb'></div>`}<div style='min-width:0'><div class='item-line'>${t.name||'—'} / ${t.code||'—'}</div><div class='item-sub'>${t.cat||'—'} • ISO ${t.iso||'—'} • ${t.maker||'—'} ${low?'<span class="warn-dot" title="Bestand niedrig"></span>':''}</div></div></div><div class='row'><button class='btn sm' data-edit='${t.id}'>Bearbeiten</button><button class='btn sm' data-del='${t.id}'>Löschen</button></div></div></div>`; }

function redraw(){ const q=$('#q').value.toLowerCase(); const cat=$('#fCat').value; const iso=$('#fISO').value; const maker=$('#fMaker').value.toLowerCase(); const arr=read(LS_TOOLS,[]).filter(t=> (q? (t.name||'').toLowerCase().includes(q)||(t.code||'').toLowerCase().includes(q):true) && (cat? t.cat===cat:true) && (iso? (t.iso||'')===iso:true) && (maker? (t.maker||'').toLowerCase().includes(maker):true)); $('#list').innerHTML = arr.map(listLine).join('') or '<div class="small">Keine Werkzeuge</div>'; $('#list').querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openEd(b.dataset.edit)); $('#list').querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{ if(confirm('Löschen?')){ write(LS_TOOLS, read(LS_TOOLS,[]).filter(x=>x.id!==b.dataset.del)); redraw(); toast('Gelöscht'); } }); }

let curId=null;
function openEd(id){ curId=id||null; const c=cats(); if(!c.length){ saveCats(['Halter','Platten','Zubehör']); } const list=read(LS_TOOLS,[]); const t=list.find(x=>x.id===id)||{id:uid(),name:'',code:'',cat:c[0]||'',iso:'',maker:'',qty:'',min:'',photo:'',note:''}; $('#edTitle').textContent= id?'Werkzeug bearbeiten':'Neues Werkzeug'; $('#tName').value=t.name; $('#tCode').value=t.code; $('#tISO').value=t.iso||''; fillCatFilters(); $('#tCat').value=t.cat||''; $('#tMaker').value=t.maker||''; $('#tQty').value=t.qty||''; $('#tMin').value=t.min||''; $('#tNote').value=t.note||''; $('#tPreview').src=t.photo||''; $('#ed').setAttribute('open',''); const file=$('#tPhoto'); file.value=''; file.onchange = (ev)=>{ const f=ev.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>{ $('#tPreview').src=r.result; }; r.readAsDataURL(f); }; $('#tSave').onclick=()=>{ const obj={id:t.id,name:$('#tName').value.trim(),code:$('#tCode').value.trim(),cat:$('#tCat').value,iso:$('#tISO').value, maker:$('#tMaker').value.trim(), qty:parseInt($('#tQty').value||'0'), min:parseInt($('#tMin').value||'0'), note:$('#tNote').value.trim(), photo:$('#tPreview').src||''}; const arr=read(LS_TOOLS,[]); const idx=arr.findIndex(x=>x.id===t.id); if(idx>=0) arr[idx]=obj; else arr.push(obj); write(LS_TOOLS,arr); $('#ed').removeAttribute('open'); redraw(); toast('Gespeichert'); }; $('#tDelete').onclick=()=>{ if(!id){ $('#ed').removeAttribute('open'); return;} if(confirm('Löschen?')){ write(LS_TOOLS, read(LS_TOOLS,[]).filter(x=>x.id!==id)); $('#ed').removeAttribute('open'); redraw(); toast('Gelöscht'); } }; }
function seed(){ if(read(LS_TOOLS,[]).length) {toast('Schon vorhanden'); return;} saveCats(['Halter','Platten','Zubehör']); const data=[{id:uid(),name:'VDI30‑Halter R',code:'VDI30-R',cat:'Halter',iso:'P',maker:'WNT',qty:3,min:1,photo:'',note:''},{id:uid(),name:'Platte CNMG120408',code:'CNMG120408-PM',cat:'Platten',iso:'M',maker:'Sandvik',qty:0,min:1,photo:'',note:''},{id:uid(),name:'APKT Fräser 50',code:'APKT 50',cat:'Zubehör',iso:'K',maker:'Iscar',qty:5,min:2,photo:'',note:''}]; write(LS_TOOLS,data); redraw(); toast('Demo hinzugefügt'); }
function toggleDrawer(open){ const d=$('#drawer'); if(open) d.setAttribute('open',''); else d.removeAttribute('open'); }
document.addEventListener('DOMContentLoaded',()=>{ fillCatFilters(); redraw(); drawCats(); $('#q').oninput=redraw; $('#fCat').onchange=redraw; $('#fISO').onchange=redraw; $('#fMaker').oninput=redraw; $('#btnNew').onclick=()=>openEd(null); $('#btnDemo').onclick=seed; $('#btnDrawer').onclick=()=>toggleDrawer(true); $('#catClose').onclick=()=>toggleDrawer(false); $('#catAdd').onclick=()=>{ const name=$('#catName').value.trim(); if(!name) return; const c=cats(); if(c.includes(name)) return; c.push(name); saveCats(c); $('#catName').value=''; }; $('#edClose').onclick=()=>$('#ed').removeAttribute('open'); });</script>
</body></html>
