<!doctype html><html lang="de"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>CitiTool — Dokumentation</title><link rel="stylesheet" href="style.css"></head><body>
<header class="header"><div class="wrap row">
  <div class="brand"><div class="logo">CT</div><div><div class="title">CitiTool Assistent</div><div class="sub">Dokumentation</div></div></div>
</div></header>
<main class="wrap" style="padding:1rem">
  <section class="card">
    <div class="card-h" style="gap:.7rem">
      <button id="btnCats" class="btn" aria-pressed="false">Kategorien</button>
      <div id="curCat" class="small" style="margin-left:.3rem;color:#475569">• Kategorie: <b>Alle</b></div>
      <span style="flex:1"></span>
      <button id="btnNew" class="btn">Neue Seite</button>
    </div>
    <div class="card-b"><div id="list" class="card"></div></div>
  </section>
  <footer class="wrap" style="padding:2rem 0 0;color:#64748b">© <span id="y"></span> CitiTool • Docs</footer>
</main>

<!-- Drawer: Kategorien -->
<div id="cats" class="drawer" role="dialog" aria-modal="true">
  <div class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <b>Kategorien</b>
      <button id="catsClose" class="btn sm">Schließen</button>
    </div>
    <div id="catList"></div>
    <div style="margin-top:10px;display:flex;gap:.4rem">
      <input id="newCatName" class="btn" placeholder="Neue Kategorie" style="flex:1">
      <button id="addCat" class="btn sm">Hinzufügen</button>
    </div>
  </div>
</div>

<!-- Editor Modal -->
<div id="dlg" class="modal" aria-modal="true" role="dialog">
  <div class="box">
    <div class="card-h" style="justify-content:space-between"><b>Seite bearbeiten</b>
      <button class="btn sm" id="btnClose">Schließen</button></div>
    <form id="fm">
      <div class="card-b grid">
        <label>Titel<input name="title" class="btn" required></label>
        <label>Kategorie
          <select name="cat" class="btn" style="height:38px"></select>
        </label>
        <label style="grid-column:1/-1">Tags (Komma)<input name="tags" class="btn" placeholder="setup, safety"></label>
        <label style="grid-column:1/-1">Markdown<textarea name="text" class="btn" rows="12"></textarea></label>
      </div>
      <div class="box foot">
        <button type="button" class="btn sm" id="btnPreview">Vorschau</button>
        <span style="flex:1"></span>
        <button type="button" class="btn" id="btnCancel">Abbrechen</button>
        <button type="submit" class="btn-solid">Speichern</button>
      </div>
    </form>
  </div>
</div>

<!-- Info Preview Modal -->
<div id="pv" class="modal" aria-modal="true" role="dialog">
  <div class="box">
    <div class="card-h" style="justify-content:space-between"><b>Vorschau</b><button class="btn sm" id="pvClose">Schließen</button></div>
    <div class="card-b"><div id="pvBody" style="white-space:pre-wrap;color:#334155"></div></div>
  </div>
</div>

<nav class="dock">
  <a class="tab" href="index.html"><span>📊</span></a>
  <a class="tab" href="docs.html" aria-current="page"><span>📘</span></a>
</nav>

<script>
const NS='ct_docs_v3', LS={DOCS:NS+'_docs', CATS:NS+'_cats'};
const $=s=>document.querySelector(s);
const read=(k,f)=>{ try{const v=localStorage.getItem(k); return v?JSON.parse(v):f }catch(e){ return f } };
const write=(k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v))}catch(e){} };
function uid(){ try{return crypto.randomUUID()}catch(e){return Math.random().toString(36).slice(2)} }
function md(s){return (s||'').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/_(.+?)_/g,'<i>$1</i>').replace(/`(.+?)`/g,'<code>$1</code>').replace(/^\-\s(.+)$/gm,'• $1');}
function lockBody(on){ if(on){ document.body.classList.add('modal-open'); window.scrollTo({top:0,behavior:'instant'}); } else { document.body.classList.remove('modal-open'); } }
function seed(){
  if(!localStorage.getItem(LS.CATS)) write(LS.CATS, ['Maschine','Setup','Sicherheit']);
  if(!localStorage.getItem(LS.DOCS)) write(LS.DOCS,[
    {id:uid(), title:'Start‑Check WT‑250', cat:'Maschine', fav:true,  tags:['checklist','safety'], text:'**Start‑Check**\n- Luft, Strom, Kühlmittel\n- Referenzfahrt\n- Not‑Aus testen'},
    {id:uid(), title:'Werkzeugwechsel VDI‑30', cat:'Setup',    fav:false, tags:['halter','wechsel'], text:'Schritte:\n1. Maschine stoppen\n2. Halter lösen\n3. Werkzeug spannen\n4. Nullpunkt prüfen'},
    {id:uid(), title:'Sicherheitshinweis',     cat:'Sicherheit',fav:false, tags:['PPE'],             text:'Brille, Handschuhe, Schuhe. Kein Schmuck. Späne nur mit Haken entfernen.'}
  ]);
}
let CAT=null; // current filter
function draw(){
  const docs=read(LS.DOCS,[]).filter(d=>!CAT || d.cat===CAT);
  const box=$('#list');
  box.innerHTML = docs.map(d=>`
    <details class="item">
      <summary class="card-b">
        <div style="display:flex;gap:.7rem;align-items:center;justify-content:space-between">
          <div style="flex:1;min-width:0">
            <div style="font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.title}</div>
            <div class="small">${d.cat||'—'} ${(d.tags||[]).length?('• '+d.tags.join(', ')):''}</div>
          </div>
          <button class="iconbtn" data-info="${d.id}">i</button>
        </div>
      </summary>
      <div class="card-b">
        <div class="small" style="white-space:pre-wrap">${md(d.text||'')}</div>
        <div style="display:flex;gap:.4rem;margin-top:.6rem;flex-wrap:wrap">
          <button class="btn sm" data-edit="${d.id}">Bearbeiten</button>
          <button class="btn-danger sm" data-del="${d.id}">Löschen</button>
        </div>
      </div>
    </details>`).join('') || '<div class="card-b small">Keine Seiten</div>';
  box.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openEditor(b.dataset.edit));
  box.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{let arr=read(LS.DOCS,[]);const i=arr.findIndex(x=>x.id===b.dataset.del);if(i>-1){arr.splice(i,1);write(LS.DOCS,arr);draw();}});
  box.querySelectorAll('[data-info]').forEach(b=>b.onclick=()=>{const d=read(LS.DOCS,[]).find(x=>x.id===b.dataset.info); if(!d) return; $('#pvBody').innerHTML=md(d.text||''); $('#pv').setAttribute('open',''); lockBody(true); });
  $('#curCat').innerHTML='• Kategorie: <b>'+ (CAT||'Alle') +'</b>';
}
function drawCats(){
  const cats=read(LS.CATS,[]), docs=read(LS.DOCS,[]);
  const host=$('#catList');
  host.innerHTML = ['Alle', ...cats].map(c=>{
    const count = c==='Alle' ? docs.length : docs.filter(d=>d.cat===c).length;
    const delBtn = (c==='Alle' || count>0) ? '' : `<button class="btn sm" data-del="${c}">Löschen</button>`;
    return `<div class="cat ${CAT===c?'active':''}" data-cat="${c}"><span>${c} <span class="small">(${count})</span></span>${delBtn}</div>`
  }).join('');
  host.querySelectorAll('.cat').forEach(el=>el.onclick=(e)=>{
    const c = el.dataset.cat;
    if(e.target && e.target.dataset && e.target.dataset.del){ return; } // let delete handle
    CAT = (c==='Alle') ? null : c;
    draw(); closeCats();
  });
  host.querySelectorAll('[data-del]').forEach(b=>b.onclick=(e)=>{e.stopPropagation(); let cats=read(LS.CATS,[]); cats = cats.filter(x=>x!==b.dataset.del); write(LS.CATS,cats); drawCats(); });
}
function openCats(){ $('#cats').setAttribute('open',''); $('#btnCats').setAttribute('aria-pressed','true'); }
function closeCats(){ $('#cats').removeAttribute('open'); $('#btnCats').setAttribute('aria-pressed','false'); }
function openEditor(id){
  const a=read(LS.DOCS,[]); const cur=id?a.find(x=>x.id===id):{id:uid(),title:'',cat:(CAT||read(LS.CATS,[])[0]||''),tags:[],text:''};
  const dlg=$('#dlg'); dlg.setAttribute('open',''); dlg.scrollTop=0; lockBody(true);
  const fm=$('#fm'); fm.title.value=cur.title||''; 
  // fill cat options
  const cats=read(LS.CATS,[]); fm.cat.innerHTML=cats.map(c=>`<option ${c===cur.cat?'selected':''}>${c}</option>`).join('');
  fm.tags.value=(cur.tags||[]).join(', '); fm.text.value=cur.text||'';
  $('#btnPreview').onclick=()=>{ $('#pvBody').innerHTML=md(fm.text.value); $('#pv').setAttribute('open',''); };
  $('#pvClose').onclick=()=>{ $('#pv').removeAttribute('open'); };
  const closeAll=()=>{ dlg.removeAttribute('open'); $('#pv').removeAttribute('open'); lockBody(false); };
  $('#btnCancel').onclick=closeAll; $('#btnClose').onclick=closeAll;
  fm.onsubmit=(e)=>{e.preventDefault();
    const obj={id:cur.id||uid(),title:fm.title.value.trim(),cat:fm.cat.value.trim(),tags:fm.tags.value.split(',').map(x=>x.trim()).filter(Boolean),text:fm.text.value};
    let arr=read(LS.DOCS,[]); const i=arr.findIndex(x=>x.id===obj.id); if(i>-1) arr[i]=obj; else arr.unshift(obj);
    write(LS.DOCS,arr); closeAll(); draw();
  };
}
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('y').textContent=new Date().getFullYear();
  seed(); draw(); drawCats();
  $('#btnNew').onclick=()=>openEditor(null);
  $('#btnCats').onclick=()=>openCats();
  $('#catsClose').onclick=()=>closeCats();
  $('#addCat').onclick=()=>{ const name=$('#newCatName').value.trim(); if(!name) return; let cats=read(LS.CATS,[]); if(!cats.includes(name)){ cats.push(name); write(LS.CATS,cats); $('#newCatName').value=''; drawCats(); } };
  $('#pvClose').onclick=()=>{ $('#pv').removeAttribute('open'); lockBody(false); };
});
</script>
</body></html>
