<!doctype html><html lang="de"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>CitiTool — Dokumentation</title><link rel="stylesheet" href="style.css"></head><body>
<header class="header"><div class="wrap row">
  <div class="brand"><div class="logo">CT</div><div><div class="title">CitiTool Assistent</div><div class="sub">Dokumentation</div></div></div>
</div></header>
<main class="wrap" style="padding:1rem">
  <section class="card">
    <div class="card-h">
      <b>Dokumentation</b>
      <div class="row">
        <button class="btn" id="favOnly">Nur Favoriten</button>
        <button class="btn" id="btnExport">Export</button>
        <button class="btn" id="btnImport">Import</button>
        <button class="btn" id="btnNew">Neue Seite</button>
      </div>
    </div>
    <div class="card-b">
      <div class="row" style="margin-bottom:8px">
        <input id="q" class="input" placeholder="Suche…">
      </div>
      <div id="list"></div>
    </div>
  </section>
</main>
<nav class="dock">
  <a class="tab" href="index.html" ><span>📊</span></a>
  <a class="tab" href="programme.html" ><span>💾</span></a>
  <a class="tab" href="setup.html" ><span>🛠️</span></a>
  <a class="tab" href="tools.html" ><span>📦</span></a>
  <a class="tab" href="docs.html" aria-current="page"><span>📚</span></a>
</nav>
<div id="ed" class="modal">
  <div class="box">
    <div class="card-h"><b>Seite bearbeiten</b><button class="btn sm" id="edClose">Schließen</button></div>
    <div class="card-b">
      <div class="row">
        <input id="dTitle" class="input" placeholder="Titel">
        <input id="dTags" class="input" placeholder="Tags (Komma)">
      </div>
      <div class="row" style="margin-top:8px">
        <textarea id="dBody" rows="10" class="input" placeholder="Markdown/Text…"></textarea>
      </div>
      <div class="row" style="margin-top:8px">
        <button class="btn" id="btnPreview">Vorschau</button>
      </div>
      <div id="preview" class="small" style="display:none;border:1px dashed var(--border);border-radius:8px;padding:10px;margin-top:8px;background:#f8fafc"></div>
    </div>
    <div class="foot">
      <button class="btn warn" id="dDelete">Löschen</button>
      <button class="btn" id="dSave">Speichern</button>
    </div>
  </div>
</div>
<input id="impFile" type="file" accept=".json" style="display:none">
<div class="toast" id="toast"></div>
<script>
const LS_DOCS='ct_docs_v1';
const $=s=>document.querySelector(s);
const read=(k,f)=>{ try{const v=localStorage.getItem(k); return v?JSON.parse(v):f }catch(e){ return f } };
const write=(k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v))}catch(e){} };
const uid=()=>Math.random().toString(36).slice(2,9);
const toast=t=>{const el=document.getElementById('toast'); el.textContent=t; el.setAttribute('show',''); setTimeout(()=>el.removeAttribute('show'),1200);};

function md(text){ return (text||'').replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\*(.*?)\*/g,'<i>$1</i>').replace(/\n/g,'<br>'); }

function line(p){ return `<div class='item'><div class='item-head'><div style='min-width:0'><div class='item-line'>${p.title||'—'}</div><div class='item-sub'>${(p.tags||[]).join(', ')}</div></div><div class='row'><button class='btn sm' data-open='${p.id}'>Öffnen</button><button class='btn sm' data-fav='${p.id}'>${p.fav?'★':'☆'}</button></div></div></div>`; }

function redraw(){ const q=document.getElementById('q').value.toLowerCase(); const favOnly=document.getElementById('favOnly').dataset.on==='1'; const arr=read(LS_DOCS,[]).filter(x=> (favOnly?x.fav:true) && (q? (x.title||'').toLowerCase().includes(q) || (x.body||'').toLowerCase().includes(q):true)); document.getElementById('list').innerHTML=arr.map(line).join('')||'<div class="small">Keine Seiten</div>'; document.getElementById('list').querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>openEd(b.dataset.open)); document.getElementById('list').querySelectorAll('[data-fav]').forEach(b=>b.onclick=()=>{ const id=b.dataset.fav; const arr=read(LS_DOCS,[]); const p=arr.find(x=>x.id===id); p.fav=!p.fav; write(LS_DOCS,arr); redraw(); }); }

let cur=null;
function openEd(id){ const arr=read(LS_DOCS,[]); let p=arr.find(x=>x.id===id); if(!p){ p={id:uid(), title:'', tags:[], body:'', fav:false}; arr.push(p); write(LS_DOCS,arr); } cur=p; document.getElementById('dTitle').value=p.title||''; document.getElementById('dTags').value=(p.tags||[]).join(', '); document.getElementById('dBody').value=p.body||''; document.getElementById('preview').style.display='none'; document.getElementById('ed').setAttribute('open',''); }
function saveEd(){ const arr=read(LS_DOCS,[]); const p=arr.find(x=>x.id===cur.id); p.title=document.getElementById('dTitle').value.trim(); p.tags=(document.getElementById('dTags').value||'').split(',').map(s=>s.trim()).filter(Boolean); p.body=document.getElementById('dBody').value; write(LS_DOCS,arr); document.getElementById('ed').removeAttribute('open'); redraw(); toast('Gespeichert'); }
function delEd(){ if(!cur) return; if(confirm('Seite löschen?')){ const arr=read(LS_DOCS,[]).filter(x=>x.id!==cur.id); write(LS_DOCS,arr); document.getElementById('ed').removeAttribute('open'); redraw(); toast('Gelöscht'); } }

function exportJson(){ const data=JSON.stringify(read(LS_DOCS,[])); const blob=new Blob([data],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='cititool_docs.json'; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(url); a.remove();},400); }
function importJson(){ const f=document.getElementById('impFile'); f.value=''; f.click(); f.onchange = ()=>{ const file=f.files[0]; if(!file) return; const r=new FileReader(); r.onload=()=>{ try{ const arr=JSON.parse(r.result); write(LS_DOCS,arr); redraw(); toast('Importiert'); }catch(e){ alert('Falsches JSON'); } }; r.readAsText(file); }; }

document.addEventListener('DOMContentLoaded',()=>{
  redraw();
  document.getElementById('btnNew').onclick=()=>openEd(null);
  document.getElementById('edClose').onclick=()=>document.getElementById('ed').removeAttribute('open');
  document.getElementById('dSave').onclick=saveEd;
  document.getElementById('dDelete').onclick=delEd;
  document.getElementById('q').oninput=redraw;
  document.getElementById('btnPreview').onclick=()=>{ const html=md(document.getElementById('dBody').value); const pv=document.getElementById('preview'); pv.innerHTML=html; pv.style.display='block'; };
  document.getElementById('btnExport').onclick=exportJson;
  document.getElementById('btnImport').onclick=importJson;
  document.getElementById('favOnly').onclick=()=>{ const b=document.getElementById('favOnly'); b.dataset.on = b.dataset.on==='1'?'0':'1'; b.textContent = b.dataset.on==='1'?'Nur Favoriten (an)':'Nur Favoriten'; redraw(); };
});
</script>
</body></html>
