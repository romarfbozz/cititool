<!doctype html><html lang="de"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>CitiTool — Dokumentation</title><link rel="stylesheet" href="style.css"></head><body>
<header class="header"><div class="wrap row">
  <div class="brand"><div class="logo">CT</div><div><div class="title">CitiTool Assistent</div><div class="sub">Dokumentation</div></div></div>
</div></header>

<main class="wrap" style="padding:1rem">
  <section class="card">
    <div class="card-h">
      <button class="btn" id="btnFilter">Filter</button>
      <div style="display:flex;gap:.7rem;margin-left:auto">
        <input id="q" class="btn" placeholder="Suchen… (Titel, Tags, Text)" style="flex:1;min-width:120px">
        <label class="btn" style="display:inline-flex;gap:.45rem;align-items:center"><input id="onlyFav" type="checkbox"> Nur Favoriten</label>
        <button id="btnExport" class="btn">Export</button>
        <label class="btn">Import<input id="fileImport" type="file" accept="application/json" style="display:none"></label>
        <button id="btnNew" class="btn-solid">Neue Seite</button>
      </div>
    </div>
    <div class="card-b"><div id="list" class="card"></div></div>
  </section>
  <footer class="wrap" style="padding:2rem 0 0;color:#64748b">© <span id="y"></span> CitiTool • Docs</footer>
</main>

<!-- Drawer -->
<div id="drawer" class="hidden">
  <div class="card" style="position:fixed;left:8px;top:76px;width:min(86vw,360px);z-index:20">
    <div class="card-h" style="justify-content:space-between"><b>Kategorien</b><button class="btn sm" id="closeDr">Schließen</button></div>
    <div class="card-b">
      <div class="small" style="color:#5f6b85;margin-bottom:6px">Aktuell: <span id="catSel" data-value="ALLE">Alle Kategorien</span></div>
      <div id="catList" style="display:flex;flex-direction:column;gap:.4rem;margin-bottom:10px"></div>
      <div style="display:flex;gap:.4rem;flex-wrap:wrap">
        <button id="catNew" class="btn sm">Neu</button>
        <button id="catRename" class="btn sm">Umbenennen</button>
        <button id="catDel" class="btn-danger sm">Löschen</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="dlg" class="hidden">
  <div class="card" style="position:fixed;left:50%;top:52%;transform:translate(-50%,-50%);width:min(96vw,980px);z-index:30">
    <div class="card-h" style="justify-content:space-between"><b>Seite bearbeiten</b><button class="btn sm" id="btnClose">Schließen</button></div>
    <form id="fm">
      <div class="card-b grid">
        <label>Titel<input name="title" class="btn" required></label>
        <label>Kategorie<input name="cat" class="btn" placeholder="z. B. Maschine"></label>
        <label style="grid-column:1/-1">Tags (Komma)<input name="tags" class="btn" placeholder="setup, safety"></label>
        <div style="grid-column:1/-1">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <div class="small" style="color:#5f6b85">Markdown</div>
            <button type="button" id="togglePrev" class="btn sm">Vorschau umschalten</button>
          </div>
          <div class="grid" style="grid-template-columns:1fr 1fr">
            <textarea name="text" class="btn" rows="12"></textarea>
            <div id="preview" class="btn" style="white-space:pre-wrap;overflow:auto"></div>
          </div>
        </div>
      </div>
      <div class="card-b" style="border-top:1px solid #d8e1ee;display:flex;justify-content:flex-end;gap:.5rem">
        <button type="button" class="btn" id="btnCancel">Abbrechen</button>
        <button type="submit" class="btn-solid">Speichern</button>
      </div>
    </form>
  </div>
</div>

<nav class="dock">
  <a class="tab" href="index.html"><span>📊</span></a>
  <a class="tab" href="docs.html" aria-current="page"><span>📘</span></a>
</nav>

<div id="toast" class="toast hidden"></div>

<script>
const NS='ct_docs_fix_inline_v1', LS={DOCS:NS+'_docs', CATS:NS+'_cats'};
const $=s=>document.querySelector(s);
const read=(k,f)=>{ try{const v=localStorage.getItem(k); return v?JSON.parse(v):f }catch(e){ return f } };
const write=(k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v))}catch(e){} };
function uid(){ try{return crypto.randomUUID()}catch(e){return Math.random().toString(36).slice(2)} }
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.remove('hidden');setTimeout(()=>t.classList.add('hidden'),1400);}

function seed(){
  if(!localStorage.getItem(LS.CATS)) write(LS.CATS, ['Maschine','Setup','Qualität','Sicherheit']);
  if(!localStorage.getItem(LS.DOCS)) write(LS.DOCS,[
    {id:uid(), title:'Start‑Check WT‑250', cat:'Maschine', fav:true,  tags:['checklist','safety'], text:'**Start‑Check**\\n- Luft, Strom, Kühlmittel\\n- Referenzfahrt\\n- Not‑Aus testen'},
    {id:uid(), title:'Werkzeugwechsel VDI‑30', cat:'Setup',    fav:false, tags:['halter','wechsel'], text:'Schritte:\\n1. Maschine stoppen\\n2. Halter lösen\\n3. Werkzeug spannen\\n4. Nullpunkt prüfen'},
    {id:uid(), title:'Sicherheitshinweis',     cat:'Sicherheit',fav:false, tags:['PPE'],             text:'Brille, Handschuhe, Schuhe. Kein Schmuck. Späne nur mit Haken entfernen.'}
  ]);
}

function md(s){return (s||'').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/_(.+?)_/g,'<i>$1</i>').replace(/`(.+?)`/g,'<code>$1</code>').replace(/^\-\s(.+)$/gm,'• $1');}

function draw(){
  const q=$('#q').value.trim().toLowerCase(); const fav=$('#onlyFav').checked; const cat=$('#catSel').dataset.value;
  let a=read(LS.DOCS,[]);
  if(cat!=='ALLE') a=a.filter(x=>(x.cat||'')===cat);
  if(fav) a=a.filter(x=>x.fav);
  if(q) a=a.filter(x=>(x.title+' '+(x.tags||[]).join(' ')+' '+(x.text||'')).toLowerCase().includes(q));
  const box=$('#list');
  box.innerHTML = a.map(d=>`
    <details>
      <summary class="card-b">
        <div style="display:flex;gap:.7rem;align-items:center;justify-content:space-between">
          <div style="flex:1;min-width:0">
            <div style="font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.title}</div>
            <div class="small" style="color:#5f6b85">${d.cat||'—'}${d.fav?' • ★':''}${d.tags && d.tags.length?' • '+d.tags.join(', '):''}</div>
          </div>
          <div class="small" style="color:#5f6b85">Tippen</div>
        </div>
      </summary>
      <div class="card-b">
        <div class="small" style="color:#5f6b85;white-space:pre-wrap">${md(d.text||'')}</div>
        <div style="display:flex;gap:.4rem;margin-top:.6rem;flex-wrap:wrap">
          <button class="btn sm" data-edit="${d.id}">Bearbeiten</button>
          <button class="btn sm" data-fav="${d.id}">${d.fav?'★ Entfernen':'☆ Favorit'}</button>
          <button class="btn-danger sm" data-del="${d.id}">Löschen</button>
        </div>
      </div>
    </details>`).join('') || '<div class="card-b" style="color:#5f6b85">Keine Seiten</div>';
  box.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openEditor(b.dataset.edit));
  box.querySelectorAll('[data-fav]').forEach(b=>b.onclick=()=>{let arr=read(LS.DOCS,[]);const i=arr.findIndex(x=>x.id===b.dataset.fav);if(i>-1){arr[i].fav=!arr[i].fav;write(LS.DOCS,arr);draw();}});
  box.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{let arr=read(LS.DOCS,[]);const i=arr.findIndex(x=>x.id===b.dataset.del);if(i>-1){arr.splice(i,1);write(LS.DOCS,arr);draw();toast('Gelöscht');}});
}

function openDrawer(){
  $('#drawer').classList.remove('hidden');
  const cats=read(LS.CATS,[]), lst=$('#catList'); lst.innerHTML='';
  const mk=(label,val)=>{const btn=document.createElement('button');btn.className='btn';btn.textContent=label;btn.onclick=()=>{$('#catSel').textContent=label;$('#catSel').dataset.value=val;$('#drawer').classList.add('hidden');draw();};return btn;};
  lst.append(mk('Alle Kategorien','ALLE')); cats.forEach(c=>lst.append(mk(c,c)));
}

function openEditor(id){
  const a=read(LS.DOCS,[]); const cur=id?a.find(x=>x.id===id):{id:uid(),title:'',cat:'',tags:[],fav:false,text:''};
  $('#dlg').classList.remove('hidden');
  const fm=$('#fm'); fm.title.value=cur.title||''; fm.cat.value=cur.cat||''; fm.tags.value=(cur.tags||[]).join(', '); fm.text.value=cur.text||'';
  const prev=$('#preview'); prev.innerHTML=md(cur.text||'');
  $('#togglePrev').onclick=()=>prev.parentElement.classList.toggle('hidden');
  $('#btnCancel').onclick=()=>$('#dlg').classList.add('hidden');
  $('#btnClose').onclick=()=>$('#dlg').classList.add('hidden');
  fm.onsubmit=(e)=>{e.preventDefault();
    const obj={id:cur.id,title:fm.title.value.trim(),cat:fm.cat.value.trim(),tags:fm.tags.value.split(',').map(x=>x.trim()).filter(Boolean),fav:cur.fav,text:fm.text.value};
    let arr=read(LS.DOCS,[]); const i=arr.findIndex(x=>x.id===obj.id); if(i>-1) arr[i]=obj; else arr.unshift(obj);
    write(LS.DOCS,arr); $('#dlg').classList.add('hidden'); draw(); toast('Gespeichert');
  };
}

document.addEventListener('DOMContentLoaded',()=>{
  $('#y').textContent=new Date().getFullYear();
  seed(); draw();
  $('#btnFilter').onclick=openDrawer; $('#closeDr').onclick=()=>$('#drawer').classList.add('hidden');
  $('#btnNew').onclick=()=>openEditor(null);
  $('#q').oninput=draw; $('#onlyFav').onchange=draw;
  $('#btnExport').onclick=()=>{const blob=new Blob([JSON.stringify({cats:read(LS.CATS,[]),docs:read(LS.DOCS,[])},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='docs-export.json';a.click();URL.revokeObjectURL(a.href);};
  $('#fileImport').onchange=(e)=>{const f=e.target.files[0];if(!f)return;const fr=new FileReader();fr.onload=()=>{try{const j=JSON.parse(fr.result);if(j.cats)write(LS.CATS,j.cats);if(j.docs)write(LS.DOCS,j.docs);draw();toast('Import ok');}catch(_){toast('Import Fehler');}};fr.readAsText(f);};
});
</script>
</body></html>
