
<!doctype html><html lang='de'><head><meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>CitiTool — Dokumentation</title>
<link rel='stylesheet' href='style.css'><link rel='stylesheet' href='docs.css'></head><body>

<header class="header"><div class="wrap row">
  <div class="brand"><div class="logo">CT</div><div><div class="title">CitiTool Assistent</div><div class="sub">Dokumentation</div></div></div>
</div></header>

<main class="wrap" style="padding:1rem">
  <section class="card">
    <div class="card-h">
      <b>Dokumentation</b>
      <div class="row">
        <button class="btn" id="favOnly">Nur Favoriten</button>
        <button class="btn" id="btnExport">Export</button>
        <button class="btn" id="btnImport">Import</button>
        <button class="btn" id="btnNew">Neue Seite</button>
      </div>
    </div>
    <div class="card-b">
      <div class="row" style="margin-bottom:8px">
        <input id="q" class="input" placeholder="Suche…">
      </div>
      <div id="list"></div>
    </div>
  </section>
</main>

<nav class="dock">
  <a class="tab" href="index.html" ><span>📊</span></a>
  <a class="tab" href="programme.html" ><span>💾</span></a>
  <a class="tab" href="setup.html" ><span>🛠️</span></a>
  <a class="tab" href="tools.html" ><span>📦</span></a>
  <a class="tab" href="docs.html" aria-current="page"><span>📚</span></a>
</nav>

<div id="ed" class="modal">
  <div class="box">
    <div class="card-h"><b>Seite bearbeiten</b><button class="btn sm" id="edClose">Schließen</button></div>
    <div class="card-b">
      <div class="row">
        <input id="dTitle" class="input" placeholder="Titel">
        <input id="dTags" class="input" placeholder="Tags (Komma)">
      </div>
      <div class="row" style="margin-top:8px">
        <textarea id="dBody" rows="10" class="input" placeholder="Markdown/Text…"></textarea>
      </div>
      <div class="row" style="margin-top:8px">
        <button class="btn" id="btnPreview">Vorschau</button>
      </div>
      <div id="preview" class="doc-preview"></div>
    </div>
    <div class="foot">
      <button class="btn sm" id="dDelete">Löschen</button>
      <button class="btn" id="dSave">Speichern</button>
    </div>
  </div>
</div>
<input id="impFile" type="file" accept=".json" style="display:none">
<div class="toast" id="toast"></div>
<script src="docs.js"></script>
</body></html>
