<!doctype html><html lang="de"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>CitiTool — Setup Planner</title><link rel="stylesheet" href="style.css"></head><body>
<header class="header"><div class="wrap row">
  <div class="brand"><div class="logo">CT</div><div><div class="title">CitiTool Assistent</div><div class="sub">Setup Planner</div></div></div>
</div></header>
<main class="wrap" style="padding:1rem">
  <section class="card">
    <div class="card-h" style="justify-content:space-between;gap:.5rem;flex-wrap:wrap">
      <div class="row">
        <button class="btn" id="tabRO" aria-pressed="true">RO (G54)</button>
        <button class="btn" id="tabRU" aria-pressed="false">RU (G55)</button>
      </div>
      <div class="row">
        <button class="btn" id="btnLoadProg">Aktives Programm laden</button>
        <button class="btn" id="btnClear">Alles leeren</button>
      </div>
    </div>
    <div class="card-b">
      <div id="grid" class="grid"></div>
    </div>
  </section>
</main>
<nav class="dock">
  <a class="tab" href="index.html" ><span>📊</span></a>
  <a class="tab" href="programme.html" ><span>💾</span></a>
  <a class="tab" href="setup.html" aria-current="page"><span>🛠️</span></a>
  <a class="tab" href="tools.html" ><span>📦</span></a>
  <a class="tab" href="docs.html" ><span>📚</span></a>
</nav>
<div id="ed" class="modal">
  <div class="box">
    <div class="card-h"><b id="edTitle">Station</b><button class="btn sm" id="edClose">Schließen</button></div>
    <div class="card-b">
      <div class="row">
        <select id="fTool"></select>
        <input id="fOp" class="input" placeholder="Operation">
        <input id="fNote" class="input" placeholder="Notiz">
      </div>
    </div>
    <div class="foot"><button id="btnDel" class="btn warn">Entfernen</button><button id="btnSave" class="btn">Speichern</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const LS_SETUP='ct_setup_live', LS_TOOLS='ct_tools_v2_tools', LS_PROG='ct_programs_v1';
const $=s=>document.querySelector(s);
const read=(k,f)=>{ try{const v=localStorage.getItem(k); return v?JSON.parse(v):f }catch(e){ return f } };
const write=(k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v))}catch(e){} };
const toast=t=>{const el=$('#toast'); el.textContent=t; el.setAttribute('show',''); setTimeout(()=>el.removeAttribute('show'),1200);};
if(!localStorage.getItem(LS_SETUP)) write(LS_SETUP,{RO:Array(12).fill(null), RU:Array(12).fill(null)});
let PLANE='RO', CUR=-1;
function isoBadge(s){ if(!s) return ''; const g=(s+'')[0].toUpperCase(); const map={P:'#2563eb',M:'#fde047',K:'#dc2626',N:'#059669',S:'#f97316',H:'#111827'}; const c=map[g]||'#94a3b8'; const t=(g==='M'||g==='S')?'#111':'#fff'; return `<span class='badge' style='background:${c};border-color:${c};color:${t}'>${g}</span>`;}
function thumb(src){ return src?(`<img class='thumb' src='${src}' alt=''>`):`<div class='thumb'></div>`;}
function draw(){ const data=read(LS_SETUP,{RO:[],RU:[]})[PLANE]; const tools=read(LS_TOOLS,[]); const host=$('#grid'); host.innerHTML=data.map((s,i)=>{ if(!s) return `<div class='card'><div class='card-b'><div style='display:flex;justify-content:space-between;align-items:center'><b>Station ${i+1}</b><button class='btn sm' data-add='${i}'>+ Hinzufügen</button></div><div class='small'>frei</div></div></div>`; const t=tools.find(x=>x.id===s.toolId)||s; return `<div class='card'><div class='card-b'><div style='display:flex;justify-content:space-between;align-items:center'><b>Station ${i+1}</b><button class='btn sm' data-edit='${i}'>i</button></div><div style='display:flex;align-items:center;gap:.6rem;margin-top:.4rem'>${thumb(t.photo||'')}<div><div style='font-weight:800'>${t.name||'—'}</div><div class='small'>${t.code||'—'} • ${t.maker||'—'} ${isoBadge(t.iso||'')}</div><div class='small'>Op: ${s.op||'—'} • Note: ${s.note||'—'}</div></div></div></div></div>`; }).join(''); host.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>openEd(parseInt(b.dataset.add), null)); host.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{ const d=read(LS_SETUP,{RO:[],RU:[]})[PLANE][parseInt(b.dataset.edit)]; openEd(parseInt(b.dataset.edit), d); }); }
function openEd(i, cur){ CUR=i; const t=read(LS_TOOLS,[]); if(!t.length){ alert('Werkzeuge leer. Добавь в Werkzeugschrank.'); return;} const sel=$('#fTool'); sel.innerHTML=t.map(x=>`<option value='${x.id}'>${x.name} / ${x.code}</option>`).join(''); if(cur&&cur.toolId) sel.value=cur.toolId; $('#fOp').value=cur?cur.op||'':''; $('#fNote').value=cur?cur.note||'':''; $('#ed').setAttribute('open',''); $('#edTitle').textContent='Station '+(i+1); }
function saveEd(){ const id=$('#fTool').value; const t=read(LS_TOOLS,[]).find(x=>x.id===id); const op=$('#fOp').value.trim(); const note=$('#fNote').value.trim(); const all=read(LS_SETUP,{RO:[],RU:[]}); if(all[PLANE].some((x,idx)=>x&&x.toolId===id&&idx!==CUR)){ if(!confirm('Werkzeug bereits verwendet. Fortfahren?')) return; } all[PLANE][CUR]={toolId:id,name:t.name,code:t.code,iso:t.iso,maker:t.maker,photo:t.photo||'',op,note}; write(LS_SETUP,all); $('#ed').removeAttribute('open'); draw(); toast('Gespeichert'); }
function delEd(){ const all=read(LS_SETUP,{RO:[],RU:[]}); all[PLANE][CUR]=null; write(LS_SETUP,all); $('#ed').removeAttribute('open'); draw(); toast('Entfernt'); }
function loadActiveProgram(){ const pid=localStorage.getItem('ct_setup_active_program'); if(!pid){ alert('Kein aktives Programm. Öffne Programme → Als aktiv setzen.'); return;} const list=read(LS_PROG,[]); const p=list.find(x=>x.id===pid); if(!p){ alert('Programm nicht gefunden'); return;} const all=read(LS_SETUP,{RO:[],RU:[]}); const arr=Array(12).fill(null); (p.tools||[]).forEach(it=>{ if(it.station>=1 && it.station<=12){ arr[it.station-1]={toolId:it.toolId,name:it.name,code:it.code,iso:it.iso,maker:it.maker,photo:it.photo||'',op:it.op||'',note:it.note||''}; } }); all[PLANE]=arr; write(LS_SETUP,all); draw(); toast('Programm geladen'); }
document.addEventListener('DOMContentLoaded',()=>{ draw(); $('#tabRO').onclick=()=>{PLANE='RO'; draw(); $('#tabRO').setAttribute('aria-pressed','true'); $('#tabRU').setAttribute('aria-pressed','false');}; $('#tabRU').onclick=()=>{PLANE='RU'; draw(); $('#tabRU').setAttribute('aria-pressed','true'); $('#tabRO').setAttribute('aria-pressed','false');}; $('#btnClear').onclick=()=>{ if(confirm('Alles in '+PLANE+' leeren?')){ const s=read(LS_SETUP,{RO:[],RU:[]}); s[PLANE]=Array(12).fill(null); write(LS_SETUP,s); draw(); } }; $('#btnSave').onclick=saveEd; $('#btnDel').onclick=delEd; $('#edClose').onclick=()=>$('#ed').removeAttribute('open'); $('#btnLoadProg').onclick=loadActiveProgram; });</script>
</body></html>
